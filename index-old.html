<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ZOMBIES EN LA MANSIÓN DEL MAL GUSTO · v2</title>
  <style>
    * { box-sizing: border-box; }
    html { background: #fff; }
    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
    }
    .app {
      max-width: 520px;
      min-height: 100svh;
      margin: 0 auto;
      padding: 12px 14px 22px;
    }
    .title {
      font-size: clamp(22px, 6.6vw, 30px);
      font-weight: 950;
      letter-spacing: -0.045em;
      margin: 0;
      line-height: .96;
      text-transform: uppercase;
    }
    .subtitle {
      margin-top: 5px;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 800;
      color: #222;
    }
    .line {
      border: 0;
      border-top: 1px solid #111;
      margin: 10px 0 8px;
    }
    .hud {
      border-top: 2px solid #111;
      border-bottom: 2px solid #111;
      padding: 7px 0 8px;
      margin: 8px 0 10px;
    }
    .hud-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px 10px;
    }
    .hud-item {
      white-space: nowrap;
      font-size: 13px;
      line-height: 1.1;
      font-weight: 900;
    }
    .hud-item .label {
      display: inline-block;
      font-size: 9px;
      line-height: 1;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #555;
      margin-right: 3px;
      vertical-align: 1px;
    }
    .equipment {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #ddd;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 850;
      color: #222;
    }
    .section { margin-top: 12px; }
    .scene-title {
      font-size: clamp(24px, 7vw, 34px);
      line-height: .98;
      letter-spacing: -0.04em;
      font-weight: 950;
      margin: 0;
    }
    .body-copy {
      margin: 8px 0 0;
      font-size: 15px;
      line-height: 1.32;
      font-weight: 800;
      color: #222;
    }
    .mini {
      font-size: 13px;
      line-height: 1.25;
      font-weight: 800;
      color: #222;
      margin-top: 6px;
    }
    .caps {
      text-transform: uppercase;
      letter-spacing: .11em;
      font-size: 10px;
      line-height: 1;
      font-weight: 950;
      color: #444;
    }
    .block {
      border-top: 1px solid #ddd;
      padding-top: 9px;
      margin-top: 9px;
    }
    .button-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 14px;
    }
    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    button {
      width: 100%;
      min-height: 43px;
      padding: 12px 13px;
      border: 1.6px solid #111;
      border-radius: 12px;
      background: #fff;
      color: #111;
      font-size: 14px;
      line-height: 1.05;
      font-weight: 900;
      text-align: left;
      touch-action: manipulation;
    }
    button.primary {
      border-width: 2px;
      min-height: 47px;
      font-size: 15px;
    }
    button.secondary { border-color: #555; color: #222; }
    button.danger { border-color: #111; }
    button:active { transform: scale(.99); }

    .impact {
      border-top: 4px solid #111;
      border-bottom: 4px solid #111;
      padding: 13px 0 14px;
      margin: 10px 0 12px;
      text-align: center;
    }
    .impact .kicker {
      margin: 0;
      font-size: 11px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    .enemy-name,
    .result-title {
      margin: 8px 0 0;
      font-size: clamp(28px, 9vw, 42px);
      line-height: .9;
      letter-spacing: -0.055em;
      font-weight: 950;
      text-transform: uppercase;
    }
    .enemy-meta,
    .result-meta {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 950;
    }
    .combat-text {
      margin-top: 10px;
      text-align: left;
      font-size: 15px;
      line-height: 1.32;
      font-weight: 850;
    }
    .combat-numbers {
      border-top: 1px solid #111;
      border-bottom: 1px solid #111;
      padding: 8px 0;
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      text-align: left;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.2;
    }
    .roll-box {
      border-top: 1px solid #ddd;
      margin-top: 8px;
      padding-top: 8px;
      text-align: left;
      font-size: 13px;
      line-height: 1.28;
      font-weight: 900;
    }
    .result-card {
      border-top: 4px solid #111;
      border-bottom: 4px solid #111;
      padding: 14px 0;
      margin-top: 10px;
      text-align: center;
    }
    .result-card.hit .result-title { font-size: clamp(29px, 10vw, 44px); }
    .result-card.win .result-title { font-size: clamp(31px, 11vw, 48px); }
    .result-text {
      margin: 10px auto 0;
      max-width: 30rem;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 900;
      text-align: center;
    }
    .changes {
      list-style: none;
      padding: 0;
      margin: 11px 0 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px 10px;
      text-align: left;
    }
    .changes li {
      border-top: 1px solid #ddd;
      padding-top: 5px;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.15;
    }
    .log {
      border-top: 1px solid #ddd;
      margin-top: 12px;
      padding-top: 7px;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 800;
      color: #333;
    }
    .log .caps { margin-right: 5px; }
    .full-log .log-item {
      font-size: 13px;
      line-height: 1.3;
      font-weight: 800;
      padding: 5px 0;
      border-top: 1px solid #eee;
    }
    @media (max-height: 690px) {
      .app { padding-top: 9px; }
      .title { font-size: clamp(20px, 6vw, 27px); }
      .subtitle { font-size: 12px; }
      .hud { padding: 6px 0; margin: 7px 0 8px; }
      .equipment { font-size: 11px; }
      .scene-title { font-size: clamp(22px, 6.3vw, 30px); }
      .body-copy { font-size: 14px; line-height: 1.25; }
      .button-stack { margin-top: 11px; gap: 7px; }
      button { min-height: 40px; padding: 10px 12px; }
      button.primary { min-height: 44px; }
      .log { margin-top: 9px; }
    }
  </style>
</head>
<body>
  <main class="app" id="app"></main>
  <script>
    const STORAGE_KEY = 'malgusto_save_v2';
    const initialWeapon = { name: 'Linterna con complejo de bate', bonus: 1, value: 0, desc: 'Alumbra poco, amenaza mucho.', upgrades: 0, id: 'linterna' };
    const weapons = [
      { id:'sarten', name:'Sartén de hierro dramática', bonus:2, value:300, desc:'Contra zombies cocineros o domésticos, +1 extra.' },
      { id:'billar', name:'Palo de billar con pasado oscuro', bonus:2, value:350, desc:'Si sacas 6, ganas +1 botín extra (100).' },
      { id:'motosierra', name:'Motosierra sin presupuesto', bonus:4, value:700, desc:'Cada ataque sube Rencor +1.' },
      { id:'escopeta', name:'Escopeta de atrezo sorprendentemente real', bonus:5, value:900, desc:'Si Pánico >=6, bonus reducido a +2.' },
      { id:'candelabro', name:'Candelabro de señora rica', bonus:3, value:500, desc:'Baja Pánico 1 al ganar contra zombies elegantes.' },
      { id:'katana', name:'Katana comprada en gasolinera', bonus:4, value:800, desc:'Con dado 1 pierdes 100 botín por vergüenza.' },
      { id:'aspiradora', name:'Aspiradora industrial poseída', bonus:3, value:600, desc:'Contra zombies pequeños, +2.' },
    ];
    const oddities = [
      { id:'chandal', name:'Chándal táctico', bonus:1, value:300, effect:'Huir +1.' },
      { id:'gafas', name:'Gafas de sol de noche', bonus:1, value:400, effect:'Reduce Pánico por trampas en 1.' },
      { id:'manual', name:'Manual de supervivencia escrito por un optimista', bonus:0, value:500, effect:'Repite una tirada cada 4 turnos.' },
      { id:'botas', name:'Botas de correr dentro de casa', bonus:1, value:500, effect:'Huir con 4-6.' },
      { id:'amuleto', name:'Amuleto de plot armor barato', bonus:0, value:900, effect:'Evita una muerte y se rompe.' },
      { id:'cinta', name:'Cinta americana multiusos', bonus:1, value:400, effect:'Vendes arma vieja por 50% extra.' },
      { id:'walkie', name:'Walkie-talkie sin nadie al otro lado', bonus:0, value:250, effect:'20% de bajar Pánico al iniciar combate.' },
    ];
    const consumables = [
      { id:'energetica', name:'Bebida energética sospechosa', desc:'+3 al próximo ataque; Pánico +1.' },
      { id:'spray', name:'Spray anti-zombie, probablemente ambientador', desc:'-2 a fuerza zombie en este combate.' },
      { id:'llave', name:'Llave oxidada', desc:'Cancela una trampa.' },
      { id:'barrita', name:'Barrita de proteína caducada', desc:'Recupera 1 vida; 20% Pánico +1.' },
      { id:'guion', name:'Guion alternativo', desc:'Repite evento actual (no jefes).' },
      { id:'foto', name:'Foto familiar que no es tuya', desc:'Pánico -2.' },
      { id:'bengala', name:'Bengala de interior', desc:'+2 combate actual, Rencor +1.' },
      { id:'cupon', name:'Cupón de ferretería', desc:'Paga 300 botín y +1 temporal próximo combate.' },
    ];
    const rooms = ['Vestíbulo','Cocina','Biblioteca','Sótano','Pasillo Infinito','Invernadero','Salón de Baile','Baño Imposible','Garaje','Sala de Retratos','Capilla Privada'];
    const zoneText = {
      'Vestíbulo':'Demasiado grande para una casa, demasiado húmedo para un museo.','Cocina':'Las cacerolas te juzgan en silencio.','Biblioteca':'Miles de libros. Cero finales felices.','Sótano':'Humedad, tubos y decisiones malas.','Pasillo Infinito':'Cada puerta parece una repetición barata.','Invernadero':'Todo crece, incluso el mal gusto.','Salón de Baile':'El suelo pide coreografía y pánico.','Baño Imposible':'Tiene tres lavabos y ninguna lógica.','Garaje':'Huele a aceite y a excusas.','Sala de Retratos':'Nadie posa así por voluntad propia.','Capilla Privada':'Un silencio elegante y sospechoso.','Puerta Principal':'Ahí fuera existe la libertad. En teoría.'
    };
    const zdefs=[{n:'Zombi Becario',b:1,l:150,e:'Lleva una acreditación mordida y muchas ganas de aprender a morder.',t:'becario'},
    {n:'Zombi Influencer de Nicho',b:2,l:200,e:'Intenta retransmitir tu persecución, pero no tiene cobertura desde 2009.',t:'influencer'},
    {n:'Zombi Mayordomo Pasivo-Agresivo',b:3,l:300,e:'Te ofrece té. El té se mueve.',t:'domestico'},
    {n:'Zombi Abuela con Andador Turbo',b:4,l:350,e:'No corre. Optimiza el desplazamiento.',t:'abuelaturbo'},
    {n:'Zombi Fontanero del Sótano',b:5,l:450,e:'Huele a humedad, cobre y decisiones municipales.',t:'fontanero'},
    {n:'Zombi Hipster de Ultramar',b:4,l:400,e:'Ya mordía cerebros antes de que fuera mainstream.',t:'hipster'},
    {n:'Zombi Payaso de Comunión',b:6,l:600,e:'No sabes qué es peor: que sea zombie o que siga haciendo globos.',t:'payaso'},
    {n:'Zombi Chef de Alta Necrococina',b:5,l:500,e:'Te describe durante cinco minutos una espuma de cerebro.',t:'chef'},
    {n:'Zombi Niño del Pasillo que No Debería Correr Tanto',b:7,l:700,e:'Aparece al fondo del pasillo. Luego al lado.',t:'nino'},
    {n:'Zombi Crítico de Cine',b:6,l:650,e:'Dice que tu arco de personaje es flojo.',t:'critico'},
    {n:'Zombi Jardinero del Invernadero',b:3,l:300,e:'Viene cubierto de tierra, hojas y rencores botánicos.',t:'jardinero'},
    {n:'Zombi Primo que Nadie Invitó',b:2,l:250,e:'No vive aquí, pero ha venido igual.',t:'primo'},
    {n:'Zombi de Gimnasio',b:5,l:550,e:'No tiene pulso, pero sí rutina de pierna.',t:'gym'},
    {n:'Zombi Bibliotecario',b:4,l:450,e:'Te manda callar mientras se le cae una oreja.',t:'biblio'},
    {n:'Zombi Inspector de Hacienda',b:8,l:900,e:'Ni vivo ni muerto perdona una declaración dudosa.',t:'hacienda'}];
    let game;
    const lines={start:['La mansión respira. Tú decides no investigar ese dato.','Una puerta se queja antes de que la toques.','El suelo cruje con intención narrativa.','Algo gotea. El guion no especifica qué.'],win:['El zombie cae. Tú finges que era el plan.','Victoria. No elegante, pero computa.'],lose:['La mansión toma nota de tu ridículo.','Eso ha dolido más en el ego que en el cuerpo.'],run:['Escapas con estilo discutible.','Tu huida parece coreografiada por el pánico.'],runFail:['Tropezón digno de secuela directa a vídeo.','Huir era buena idea. Ejecutarla era otra cosa.']};
    const app=document.getElementById('app');

    function newGame(){game={state:'explore',turn:1,level:1,life:3,maxLife:3,panic:0,mansionGrudge:0,room:'Vestíbulo',loot:0,zombiesDefeated:0,weapon:{...initialWeapon},oddity:null,consumables:[],tempStatus:null,cosmeticRidiculous:false,currentEnemy:null,currentEvent:null,currentLoot:null,lastRoll:null,result:null,defeatReason:'',sceneLine:rc(lines.start),flags:{selfEsteemBought:false,exitFound:false,amuletUsed:false,manualCooldown:0,trapsInARow:0,nonCombatInARow:0,nextZombieModifier:0,inFinalBoss:false,boostNextAttack:0,sprayDebuff:0,bengalaBuff:0}};addLog('Empiezas con una linterna y una autoestima prematura.');saveGame();render();}
    function addLog(t){game.log=[t,...(game.log||[])].slice(0,5);}
    function roll(){return 1+Math.floor(Math.random()*6)}
    function pct(n){return Math.random()*100<n}
    function rc(a){return a[Math.floor(Math.random()*a.length)]}
    function saveGame(){localStorage.setItem(STORAGE_KEY,JSON.stringify(game))}
    function loadGame(){try{const g=JSON.parse(localStorage.getItem(STORAGE_KEY));if(!g||!g.weapon) return false;game=g;if(!game.sceneLine)game.sceneLine=rc(lines.start);return true;}catch{return false;}}
    function clearSave(){localStorage.removeItem(STORAGE_KEY)}
    function clamp(){game.life=Math.max(0,Math.min(game.maxLife,game.life));game.panic=Math.max(0,Math.min(10,game.panic));game.mansionGrudge=Math.max(0,game.mansionGrudge)}
    function setState(s){game.state=s;if(s==='explore')game.sceneLine=rc(lines.start);game.result=null;saveGame();render();window.scrollTo(0,0)}
    function snapshot(){return {level:game.level,life:game.life,maxLife:game.maxLife,panic:game.panic,mansionGrudge:game.mansionGrudge,loot:game.loot,zombiesDefeated:game.zombiesDefeated};}
    function deltaLine(label, before, after, suffix='') { const d=after-before; if(!d)return null; return `${d>0?'+':''}${d} ${label}${suffix}`; }
    function buildChanges(before){
      const after=snapshot();
      return [
        deltaLine('vida', before.life, after.life),
        deltaLine('vida máxima', before.maxLife, after.maxLife),
        deltaLine('pánico', before.panic, after.panic),
        deltaLine('rencor', before.mansionGrudge, after.mansionGrudge),
        deltaLine('nivel', before.level, after.level),
        deltaLine('botín', before.loot, after.loot),
        deltaLine('zombie', before.zombiesDefeated, after.zombiesDefeated, after.zombiesDefeated-before.zombiesDefeated===1?' derrotado':'s derrotados')
      ].filter(Boolean);
    }
    function showResult(type,kicker,title,text,changes,next){game.result={type,kicker,title,text,changes:changes&&changes.length?changes:['Sin cambios. Sospechoso.'],next};game.state='result';}
    function effectiveWeaponBonus(){let b=game.weapon.bonus+(game.weapon.upgrades||0); if(game.weapon.id==='escopeta'&&game.panic>=6)b=2+(game.weapon.upgrades||0); if(game.currentEnemy?.tag==='fontanero')b=Math.max(0,b-1);return b;}
    function heroBase(){return game.level+effectiveWeaponBonus()+(game.oddity?.bonus||0)+(game.tempStatus==='Inspirado'?2:0)+game.flags.boostNextAttack+game.flags.bengalaBuff;}
    function chooseRoom(){if(game.flags.exitFound&&game.level>=9&&pct(45))return 'Puerta Principal'; if(game.level>=9&&pct(25))return 'Puerta Principal'; return rc(rooms);}
    function advanceTurn(){game.turn++;if(game.turn%3===0){game.mansionGrudge++;addLog('La mansión frunce vigas. Rencor +1.');}if(game.oddity?.id==='manual'&&game.flags.manualCooldown>0)game.flags.manualCooldown--;if(game.mansionGrudge>=12&&!game.flags.inFinalBoss){lose('Rencor 12');return;} game.room=chooseRoom(); game.sceneLine=rc(lines.start); generateEncounter(); clamp(); saveGame(); render();window.scrollTo(0,0);}
    function generateEncounter(){ if((game.level>=9&&game.flags.exitFound)||(game.turn>=20&&game.level>=8&&game.room==='Puerta Principal')){startFinalBoss();return;} let weights={z:45,e:20,l:15,t:10,o:7,s:3}; if(game.room==='Sótano'){weights.z+=10;weights.l+=20;} if(game.room==='Biblioteca'){weights.e+=10;weights.z-=5;} if(game.room==='Garaje'){weights.o+=10;} if(game.mansionGrudge>=8)weights.z+=10; if(game.panic>=7)weights.t+=5; if(game.flags.trapsInARow>=2)weights.t=0; if(game.flags.nonCombatInARow>=3)weights.z+=25;
      const r=Math.random()*(weights.z+weights.e+weights.l+weights.t+weights.o+weights.s); let c='z',acc=weights.z; if(r>acc){acc+=weights.e;c='e';} if(r>acc){acc+=weights.l;c='l';} if(r>acc){acc+=weights.t;c='t';} if(r>acc){acc+=weights.o;c='o';} if(r>acc)c='s';
      if(c==='z'){game.flags.trapsInARow=0;game.flags.nonCombatInARow=0; startCombat(generateZombie());}
      if(c==='e'){game.flags.nonCombatInARow++; game.flags.trapsInARow=0; game.currentEvent=genEvent(); setState('event');}
      if(c==='l'){game.flags.nonCombatInARow++; game.flags.trapsInARow=0; gainLoot(100+Math.floor(Math.random()*260)); addLog('Encuentras botín en una cajita sin contexto.'); setState('explore');}
      if(c==='t'){game.flags.nonCombatInARow++; game.flags.trapsInARow++; applyTrap(); setState('explore');}
      if(c==='o'){game.flags.nonCombatInARow++; game.flags.trapsInARow=0; game.currentLoot=genItemLoot(); setState('loot');}
      if(c==='s'){game.flags.nonCombatInARow++; game.flags.trapsInARow=0; setState('shop');}
    }
    function generateZombie(){const d=rc(zdefs);let lv=d.b+Math.floor(game.mansionGrudge/3)+Math.floor(Math.random()*Math.max(1,Math.min(4,game.level))); if(game.turn<=3)lv=Math.min(lv,4); if(game.room==='Sótano')lv++; if(game.mansionGrudge>=8&&pct(35))lv++; return {name:d.n,base:d.b,level:lv,loot:d.l,text:d.e,tag:d.t,isBoss:false,isMini:false};}
    function startCombat(e){game.currentEnemy=e;game.lastRoll=null; if(game.oddity?.id==='walkie'&&pct(20)){game.panic=Math.max(0,game.panic-1);addLog('El walkie chisporrotea ánimo. Pánico -1.');} if(e.tag==='payaso'){game.panic++;} if(e.tag==='hacienda'){const cut=Math.floor(game.loot*0.2);game.loot=Math.max(0,game.loot-cut); addLog('Inspección exprés: pierdes '+cut+' de botín.');} game.state='combat'; saveGame(); render();}
    function enemyBase(){let b=game.currentEnemy.level+game.flags.nextZombieModifier; if(game.currentEnemy.isBoss) b=12+Math.floor(game.mansionGrudge/2); if(game.currentEnemy.tag==='hipster'&&(game.weapon.bonus+(game.weapon.upgrades||0)>=4))b+=2; if(game.currentEnemy.tag==='gym'&&game.life===game.maxLife)b+=2; if(game.currentEnemy.tag==='jardinero'&&(game.room==='Invernadero'||game.room==='Jardín'))b+=2; b-=game.flags.sprayDebuff; return b;}
    function attack(){const before=snapshot(); const e=game.currentEnemy; let hb=heroBase()-(e.tag==='critico'?1:0); let eb=enemyBase(); let hd=roll(),ed=roll(); if(game.weapon.id==='motosierra')game.mansionGrudge++; if(game.weapon.id==='katana'&&hd===1){game.loot=Math.max(0,game.loot-100);addLog('La katana te da vergüenza fiscal: -100 botín.');}
      if(game.weapon.id==='billar'&&hd===6)gainLoot(100); if(game.weapon.id==='aspiradora'&&(e.tag==='nino'||e.tag==='becario'))hb+=2; if(game.weapon.id==='sarten'&&(e.tag==='chef'||e.tag==='domestico'))hb+=1; if(e.tag==='chef'&&game.weapon.id==='sarten')hb+=1;
      if(e.tag==='gemelo')ed=Math.max(ed,roll());
      const ht=hb+hd,et=eb+ed; game.lastRoll={hb,hd,ht,eb,ed,et}; game.flags.boostNextAttack=0; game.flags.bengalaBuff=0; game.flags.sprayDebuff=0; if(ht>et)resolveWin(before); else resolveLoss(ht===et,before); clamp(); saveGame(); render();window.scrollTo(0,0);}
    function resolveWin(before){const e=game.currentEnemy; const text=rc(lines.win); addLog(text); game.zombiesDefeated++; gainLoot(e.loot+Math.floor(Math.random()*140)); if(e.level>=game.level)gainLevel(1,'combate'); if(e.level>=game.level+3)gainLevel(1,'combate épico'); if(game.weapon.id==='candelabro'&&(e.tag==='domestico'||e.tag==='hipster'))game.panic=Math.max(0,game.panic-1); if(e.tag==='primo'&&pct(35))addConsumable(rc(consumables)); if(game.level===9&&!game.flags.exitFound&&pct(35)){game.flags.exitFound=true;addLog('Encuentras una ruta hacia la Puerta Principal.');}
      if(e.isBoss){game.level=10;game.currentEnemy=null;setState('victory');return;} game.currentEnemy=null; showResult('win','VICTORIA',rc(['SIGUES VIVO','NO ERA EL PLAN','VICTORIA CUTRE','EL ZOMBIE CAE']),text,buildChanges(before),'explore');}
    function resolveLoss(tie,before){game.life--;game.panic++; const text=tie?'Empate. En esta mansión gana quien peor huele.':rc(lines.lose); addLog(text); applyBadStuff(game.currentEnemy); if(checkDefeat())return; showResult('hit','TE HAN DADO',tie?'EMPATE FATAL':rc(['MAL GOLPE','AUCH','NO IBA ASÍ','RIDÍCULO PARCIAL']),text,buildChanges(before),'combat');}
    function tryRun(){const before=snapshot(); const e=game.currentEnemy; let d=roll(),need=5,bonus=0; if(game.panic>=7)need=6; if(game.oddity?.id==='botas')need=4; if(e.tag==='nino'||e.isBoss)need=6; if(e.tag==='abuelaturbo')need=Math.min(6,need+1); if(game.tempStatus==='Resbaladizo')bonus-=1; if(game.oddity?.id==='chandal')bonus+=1; if(d+bonus>=need){game.currentEnemy=null;game.mansionGrudge++;const text=rc(lines.run);addLog(text);showResult('run','HUIDA',rc(['ESCAPAS','DIGNIDAD NEGOCIABLE']),text,buildChanges(before),'explore');} else {game.life--;game.panic++;const text=rc(lines.runFail);addLog(text);applyBadStuff(e); if(game.life<=0&&e.isBoss)lose('Final boss'); if(checkDefeat())return; showResult('hit','HUIDA FALLIDA','TROPEZÓN OFICIAL',text,buildChanges(before),'combat');} clamp(); saveGame(); render();window.scrollTo(0,0);}
    function applyBadStuff(e){if(e.tag==='influencer'){game.panic++; game.loot=Math.max(0,game.loot-100);} if(e.tag==='domestico'&&game.consumables.length)game.consumables.splice(Math.floor(Math.random()*game.consumables.length),1); if(e.tag==='fontanero')game.mansionGrudge++; if(e.tag==='hipster')game.loot=Math.max(0,game.loot-200); if(e.tag==='payaso')game.panic+=2; if(e.tag==='nino')game.level=Math.max(1,game.level-1); if(e.tag==='critico'){game.panic++;game.loot=Math.max(0,game.loot-100);} if(e.tag==='hacienda'){if(game.loot>=300)game.loot-=300; else game.level=Math.max(1,game.level-1);} }
    function gainLevel(a){for(let i=0;i<a;i++){if(game.level>=9&&!game.currentEnemy?.isBoss)break; game.level++; addLog('Subes de nivel. Tu autoestima no sabe gestionarlo.'); if(game.level===4||game.level===7){game.maxLife++;game.life=Math.min(game.maxLife,game.life+1);addLog('Tu cuerpo acepta seguir viviendo. Vida máxima +1.');}}}
    function gainLoot(a){game.loot+=Math.max(0,a)}
    function genItemLoot(){const r=Math.random(); if(r<0.4)return {type:'weapon',item:{...rc(weapons),upgrades:0}}; if(r<0.7)return {type:'oddity',item:{...rc(oddities)}}; return {type:'consumable',item:{...rc(consumables)}}}
    function addConsumable(c){if(game.consumables.length<3){game.consumables.push(c);addLog('Guardas: '+c.name);} else {addLog('Mochila llena. Lo dejas por dignidad.');}}
    function applyTrap(){if(game.consumables.some(c=>c.id==='llave')&&pct(20)){const i=game.consumables.findIndex(c=>c.id==='llave');game.consumables.splice(i,1);addLog('Usas Llave oxidada y cancelas una trampa.');return;} const t=rc(['Alfombra con Ambiciones','Candelabro con Problemas de Apego','Escalera Dramática','Libro con Opiniones','Puerta Falsa','Jarrón Familiar Carísimo','Moqueta que Hace Ruido Mojado','Retrato del Propietario']);
      if(t==='Alfombra con Ambiciones')game.life--; if(t==='Candelabro con Problemas de Apego'){game.panic+=(game.oddity?.id==='gafas'?0:1);game.loot=Math.max(0,game.loot-100);} if(t==='Escalera Dramática'){if(game.oddity?.id!=='botas'){if(pct(50))game.life--;else game.panic+=2;}} if(t==='Libro con Opiniones')game.level=Math.max(1,game.level-1); if(t==='Puerta Falsa'){game.mansionGrudge++;game.turn++;} if(t==='Jarrón Familiar Carísimo'){if(game.loot>=300)game.loot-=300;else game.panic++;} if(t==='Moqueta que Hace Ruido Mojado')game.flags.nextZombieModifier=2; if(t==='Retrato del Propietario'){if(game.mansionGrudge>=6)startCombat(generateZombie()); else game.panic++;} addLog('Trampa: '+t+'.'); checkDefeat();}
    function genEvent(){return rc(['Armario lleno de abrigos dramáticos','Teléfono que suena sin línea','Espejo demasiado sincero','Despensa de latas sin etiqueta','Caja fuerte ridículamente obvia','Sillón sospechosamente cómodo','Retrato que cambia de peinado','Ventana tapiada por exigencias del guion','Mesa con llaves, ninguna útil']);}
    function resolveEvent(choice){const ev=game.currentEvent; if(ev==='Armario lleno de abrigos dramáticos'){if(choice==='buscar'){const r=Math.random();if(r<0.6)gainLoot(150);else if(r<0.9){startCombat(generateZombie());return;}else game.panic++;}}
      if(ev==='Teléfono que suena sin línea'){if(choice==='contestar'){const r=Math.random();if(r<0.5)game.panic=Math.max(0,game.panic-1);else if(r<0.8)game.panic++;else {startCombat(generateZombie());return;}} }
      if(ev==='Espejo demasiado sincero'){if(game.oddity?.id!=='gafas')game.panic++;}
      if(ev==='Despensa de latas sin etiqueta'){addConsumable({...rc(consumables)}); if(pct(20))game.panic++;}
      if(ev==='Caja fuerte ridículamente obvia'&&choice==='abrir'){const r=Math.random();if(r<0.5)gainLoot(500); else if(r<0.8)applyTrap(); else {game.currentLoot=genItemLoot();setState('loot');return;}}
      if(ev==='Sillón sospechosamente cómodo'){game.life=Math.min(game.maxLife,game.life+1);game.mansionGrudge++;}
      if(ev==='Retrato que cambia de peinado'){game.panic++; if(game.level>=5&&pct(30)){startCombat({name:'La Novia del Retrato Torcido',level:7,loot:900,text:'Su vestido flota. Su resentimiento también.',tag:'mininovia',isMini:true});return;}}
      if(ev==='Ventana tapiada por exigencias del guion'){if(game.level>=8){game.flags.exitFound=true;addLog('Detectas una salida potencial.');}}
      if(ev==='Mesa con llaves, ninguna útil'){gainLoot(100); if(pct(20))addConsumable({id:'llave',name:'Llave oxidada',desc:'Cancela una trampa.'});}
      game.currentEvent=null; checkDefeat(); setState('explore');}
    function useConsumable(i,ctx='any'){const c=game.consumables[i]; if(!c)return; if(c.id==='energetica'){game.flags.boostNextAttack+=3;game.panic++;}
      if(c.id==='spray'&&game.currentEnemy){game.flags.sprayDebuff=2;} if(c.id==='barrita'){game.life=Math.min(game.maxLife,game.life+1+(game.tempStatus==='Hambriento'?1:0)); if(pct(20))game.panic++;} if(c.id==='guion'&&game.state==='event'){game.currentEvent=genEvent();} if(c.id==='foto'){game.panic=Math.max(0,game.panic-2);} if(c.id==='bengala'){game.flags.bengalaBuff=2;game.mansionGrudge++;} if(c.id==='cupon'&&game.loot>=300){game.loot-=300;game.flags.boostNextAttack+=1;}
      game.consumables.splice(i,1); addLog('Usas '+c.name+'.'); clamp(); checkDefeat(); saveGame(); render();}
    function checkDefeat(){if(game.life<=0){if(game.oddity?.id==='amuleto'&&!game.flags.amuletUsed){game.flags.amuletUsed=true;game.life=1;game.oddity=null;addLog('El amuleto se rompe y te salva con 1 vida.');return false;} lose('Vida 0');return true;} if(game.panic>=10){lose('Pánico 10');return true;} if(game.mansionGrudge>=12&&!game.flags.inFinalBoss){lose('Rencor 12');return true;} return false;}
    function lose(r){game.defeatReason=r;game.state='defeat';saveGame();render();}
    function startFinalBoss(){game.flags.inFinalBoss=true;startCombat({name:'El Propietario Original, pero Muy Mal Conservado',level:12,loot:0,text:'Está en la puerta principal con una bata, una escritura de propiedad y cero intención de dejarte marchar.',tag:'boss',isBoss:true});}
    function equipLoot(){if(!game.currentLoot)return; const l=game.currentLoot; if(l.type==='weapon'){game.weapon=l.item;addLog('Equipas nueva arma.');} if(l.type==='oddity'){game.oddity=l.item;addLog('Te equipas algo raro.');} if(l.type==='consumable')addConsumable(l.item); game.currentLoot=null;setState('explore');}
    function sellLoot(){if(!game.currentLoot)return; gainLoot(game.currentLoot.item.value||100);game.currentLoot=null;setState('explore');}
    function discardLoot(){game.currentLoot=null;setState('explore');}
    function sellConsumable(i){game.loot+=100;game.consumables.splice(i,1);setState('inventory');}
    function discardConsumable(i){game.consumables.splice(i,1);setState('inventory');}

    function btn(t,fn,c=''){return `<button class="${c}" onclick="${fn}" aria-label="${t}"><strong>${t}</strong></button>`}
    function topBar(g){return `<header><h1 class="title"><strong>ZOMBIES EN LA MANSIÓN DEL MAL GUSTO</strong></h1><div class="subtitle"><strong>${g.room||'Vestíbulo'}</strong> · Turno ${g.turn||1}</div></header>`;}
    function hud(g){
      const equip=[`Arma +${effectiveWeaponBonus()}: ${g.weapon.name}`];
      if(g.oddity) equip.push(`Raro: ${g.oddity.name}`);
      if(g.tempStatus) equip.push(`Estado: ${g.tempStatus}`);
      return `<section class="hud"><div class="hud-row">
        <div class="hud-item"><span class="label">NV</span>${g.level}</div>
        <div class="hud-item"><span class="label">FUE</span>${heroBase()}</div>
        <div class="hud-item"><span class="label">VIDA</span>${g.life}/${g.maxLife}</div>
        <div class="hud-item"><span class="label">PAN</span>${g.panic}/10</div>
        <div class="hud-item"><span class="label">REN</span>${g.mansionGrudge}/12</div>
        <div class="hud-item"><span class="label">BOTÍN</span>${g.loot}</div>
      </div><div class="equipment">${equip.join(' · ')}</div></section>`;
    }
    function compactLog(g){const last=(g.log&&g.log[0])?g.log[0]:'Silencio narrativo.';return `<section class="log"><span class="caps"><strong>Último</strong></span><strong>${last}</strong></section>`;}
    function actionButtons(primary, primaryFn, secondaryA, secondaryAFn, secondaryB, secondaryBFn){
      return `<div class="button-stack">${btn(primary,primaryFn,'primary')}<div class="button-row">${btn(secondaryA,secondaryAFn,'secondary')}${btn(secondaryB,secondaryBFn,'secondary')}</div></div>`;
    }
    function render(){const g=game;if(g.state==='result'&&!g.result)g.state='explore'; const top=topBar(g);
      if(g.state==='start'){app.innerHTML=top+`<hr class="line"><section class="section"><p class="scene-title"><strong>Una mansión. Muchos zombies. Muy poco presupuesto emocional.</strong></p><div class="button-stack">${btn('Nueva partida','newGame()','primary')}${localStorage.getItem(STORAGE_KEY)?btn('Continuar partida','if(loadGame()){setState(\'explore\')}','secondary'):''}${btn('Cómo se juega','setState(\'rules\')','secondary')}</div></section>`;return;}
      if(g.state==='rules'){app.innerHTML=top+`<hr class="line"><p class="body-copy"><strong>Eres el héroe improbable de una película de zombies rodada con presupuesto emocional. Avanza, pelea, equípate y gestiona vida, pánico y rencor. Tu fuerza es nivel + equipo + dado. Si empatas, gana el zombie. Para escapar, alcanza nivel 10 derrotando al horror de la puerta principal.</strong></p><div class="button-stack">${btn('Volver','setState(\'start\')','primary')}</div>`;return;}
      const stats=hud(g);
      let main='';
      if(g.state==='explore') main=`<section class="section"><p class="scene-title"><strong>${g.sceneLine||rc(lines.start)}</strong></p><p class="body-copy"><strong>${zoneText[g.room]}</strong></p>${actionButtons('Avanzar por la mansión','advanceTurn()','Mochila','setState(\'inventory\')','Reiniciar','if(confirm(\'¿Reiniciar partida?\')){clearSave();newGame();}')}</section>`;
      if(g.state==='event') main=`<section class="section"><p class="caps"><strong>Evento</strong></p><p class="scene-title"><strong>${g.currentEvent}</strong></p><p class="body-copy"><strong>La mansión te ofrece una decisión discutible.</strong></p><div class="button-stack">${g.currentEvent.includes('Teléfono')?btn('Contestar como protagonista','resolveEvent(\'contestar\')','primary'):''}${g.currentEvent.includes('Teléfono')?btn('Ignorarlo con madurez','resolveEvent(\'ignorar\')','secondary'):''}${g.currentEvent.includes('Armario')?btn('Buscar entre abrigos','resolveEvent(\'buscar\')','primary'):''}${g.currentEvent.includes('Caja fuerte')?btn('Abrir caja fuerte','resolveEvent(\'abrir\')','primary'):''}${(!g.currentEvent.includes('Teléfono')&&!g.currentEvent.includes('Armario')&&!g.currentEvent.includes('Caja fuerte'))?btn('Continuar','resolveEvent(\'seguir\')','primary'):''}</div></section>`;
      if(g.state==='combat'){const e=g.currentEnemy; main=`<section class="section"><div class="impact"><p class="kicker"><strong>${e.isBoss?'JEFE FINAL':'ALGO SE MUEVE'}</strong></p><h2 class="enemy-name"><strong>${e.name}</strong></h2><div class="enemy-meta"><strong>Nivel ${e.level}${e.isBoss?' · La puerta no se negocia':''}</strong></div><p class="combat-text"><strong>${e.text}</strong></p><div class="combat-numbers"><div><span class="caps">Tú</span><br>Base ${heroBase()} + dado</div><div><span class="caps">Él</span><br>Base ${enemyBase()} + dado</div></div>${g.lastRoll?`<div class="roll-box"><div><strong>Tú:</strong> ${g.lastRoll.hb} + dado ${g.lastRoll.hd} = ${g.lastRoll.ht}</div><div><strong>Zombi:</strong> ${g.lastRoll.eb} + dado ${g.lastRoll.ed} = ${g.lastRoll.et}</div><div><strong>Empates:</strong> gana el zombie.</div></div>`:`<div class="roll-box"><strong>Empates:</strong> gana el zombie, porque la casa no tiene comité ético.</div>`}</div>${actionButtons('Atacar','attack()','Mochila','setState(\'inventory\')','Huir','tryRun()')}</section>`;}
      if(g.state==='result'){const r=g.result; const nextButtons=r.next==='combat'&&g.currentEnemy?`<div class="button-stack">${btn('Seguir peleando','setState(\'combat\')','primary')}<div class="button-row">${btn('Mochila','setState(\'inventory\')','secondary')}${btn('Huir','tryRun()','secondary')}</div></div>`:`<div class="button-stack">${btn('Continuar','setState(\'explore\')','primary')}</div>`; main=`<section class="section"><div class="result-card ${r.type}"><p class="caps"><strong>${r.kicker}</strong></p><h2 class="result-title"><strong>${r.title}</strong></h2><p class="result-text"><strong>${r.text}</strong></p><ul class="changes">${r.changes.map(c=>`<li>${c}</li>`).join('')}</ul></div>${nextButtons}</section>`;}
      if(g.state==='loot'){const l=g.currentLoot; main=`<section class="section"><p class="caps"><strong>Botín raro</strong></p><p class="scene-title"><strong>${l.item.name}</strong></p><p class="body-copy"><strong>${l.item.desc||l.item.effect||''}</strong></p><div class="button-stack">${btn(l.type==='weapon'?'Equipar arma':l.type==='oddity'?'Equipar objeto raro':'Guardar en mochila','equipLoot()','primary')}${btn('Vender y no hacer preguntas','sellLoot()','secondary')}${btn('Tirarlo como si sobrara','discardLoot()','secondary')}</div></section>`;}
      if(g.state==='shop') main=`<section class="section"><p class="scene-title"><strong>Habitación segura, más o menos</strong></p><p class="body-copy"><strong>Hay una silla, una máquina expendedora y calma legalmente discutible.</strong></p><div class="button-stack">${g.loot>=300&&g.life<g.maxLife?btn('Curar 1 vida por 300','game.loot-=300;game.life++;setState(\'shop\')','primary'):''}${g.loot>=700&&(g.weapon.upgrades||0)<2?btn('Mejorar arma por 700','game.loot-=700;game.weapon.upgrades=(game.weapon.upgrades||0)+1;addLog(\'Arma mejorada.\');setState(\'shop\')','primary'):''}${g.loot>=500&&g.mansionGrudge>0?btn('Sobornar a la mansión','game.loot-=500;game.mansionGrudge--;addLog(\'Dejas dinero en una mesita. La mansión respeta los rituales.\');setState(\'shop\')','primary'):''}${g.loot>=1000&&!g.flags.selfEsteemBought&&g.level<9?btn('Comprar autoestima','game.loot-=1000;game.flags.selfEsteemBought=true;gainLevel(1,\'autoestima\');if(game.level>8)game.level=8;addLog(\'Compras autoestima en cuotas emocionales.\');setState(\'shop\')','primary'):''}${btn('Seguir avanzando','setState(\'explore\')','secondary')}</div></section>`;
      if(g.state==='inventory') main=`<section class="section"><p class="scene-title"><strong>Mochila y equipo</strong></p><div class="block"><div class="mini"><strong>Arma:</strong> ${g.weapon.name} (+${g.weapon.bonus+(g.weapon.upgrades||0)})</div><div class="mini"><strong>${g.weapon.desc}</strong></div></div><div class="block"><div class="mini"><strong>Objeto raro:</strong> ${g.oddity?g.oddity.name:'Nada. Minimalismo defensivo.'}</div>${g.oddity?`<div class="mini"><strong>${g.oddity.effect}</strong></div>`:''}</div><div class="block"><div class="mini"><strong>Consumibles:</strong></div>${g.consumables.length?g.consumables.map((c,i)=>`<div class="mini"><strong>${c.name}</strong> · ${c.desc}</div><div class="button-row">${btn('Usar','useConsumable('+i+')','secondary')}${btn('Vender','sellConsumable('+i+')','secondary')}</div>`).join(''):`<div class="mini"><strong>Tu mochila contiene aire, migas y una confianza injustificada.</strong></div>`}</div><div class="button-stack">${btn('Volver','setState(\''+(game.currentEnemy?'combat':'explore')+'\')','primary')}</div><section class="full-log block"><div class="caps"><strong>Últimos sucesos</strong></div>${(g.log||[]).map(x=>`<div class="log-item"><strong>${x}</strong></div>`).join('')}</section></section>`;
      if(g.state==='victory'){const title=g.panic<=3?'Profesional del Paseo Incómodo':g.panic>=8?'Héroe por Accidente y Sudor':g.zombiesDefeated>=12?'Tasador de Mandíbulas':g.turn<=14?'Speedrunner de la Humedad':g.life===1?'Casi Decoración del Sótano':'Superviviente con Buen Marketing'; main=`<section class="section"><div class="result-card win"><p class="caps"><strong>HAS ESCAPADO</strong></p><h2 class="result-title"><strong>LIBERTAD CUTRE</strong></h2><p class="result-text"><strong>La mansión queda atrás. La noche huele a libertad y a secuela barata.</strong></p><ul class="changes"><li>Turnos: ${g.turn}</li><li>Zombies: ${g.zombiesDefeated}</li><li>Nivel: ${g.level}</li><li>Pánico: ${g.panic}</li><li>Rencor: ${g.mansionGrudge}</li><li>Botín: ${g.loot}</li></ul><p class="result-meta"><strong>Título: ${title}</strong></p></div><div class="button-stack">${btn('Nueva partida','clearSave();newGame()','primary')}</div></section>`; clearSave();}
      if(g.state==='defeat'){const map={'Vida 0':['TE HAN PILLADO','Tu carrera de héroe termina en una moqueta cuestionable.'],'Pánico 10':['HAS PERDIDO LOS PAPELES','Empiezas a narrar la trama en voz alta. La mansión aprovecha.'],'Rencor 12':['LA COMUNIDAD HA VOTADO','El Comité de Vecinos Zombi no aprueba tu convivencia.'],'Final boss':['EL PROPIETARIO NO NEGOCIA','La escritura sigue a su nombre. Tú pasas a mobiliario narrativo.']};const d=map[g.defeatReason]||['DERROTA','La mansión gana por insistencia.']; main=`<section class="section"><div class="result-card hit"><p class="caps"><strong>DERROTA</strong></p><h2 class="result-title"><strong>${d[0]}</strong></h2><p class="result-text"><strong>${d[1]}</strong></p><ul class="changes"><li>Turnos: ${g.turn}</li><li>Nivel: ${g.level}</li><li>Zombies: ${g.zombiesDefeated}</li><li>Botín: ${g.loot}</li></ul></div><div class="button-stack">${btn('Nueva partida','clearSave();newGame()','primary')}</div></section>`; clearSave();}
      app.innerHTML=top+stats+main+(g.state==='inventory'?'':compactLog(g));
    }
    window.newGame=newGame;window.loadGame=loadGame;window.setState=setState;window.advanceTurn=advanceTurn;window.attack=attack;window.tryRun=tryRun;window.resolveEvent=resolveEvent;window.useConsumable=useConsumable;window.addConsumable=addConsumable;window.gainLoot=gainLoot;window.clearSave=clearSave;window.addLog=addLog;window.equipLoot=equipLoot;window.sellLoot=sellLoot;window.discardLoot=discardLoot;window.sellConsumable=sellConsumable;window.discardConsumable=discardConsumable;
    if(!loadGame())newGame(); else render();
  </script>
</body>
</html>
