<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Mansión Encantada</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #050505;
      --muted: #6f6f6f;
      --soft: #d9d9d9;
      --hair: #111111;
      --maxw: 520px;
      --radius: 28px;
      --ease: cubic-bezier(.2,.8,.2,1);
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --display: Impact, "Arial Black", "Helvetica Neue Condensed Black", "Arial Narrow", var(--sans);
      --serif: Didot, "Bodoni 72", "Bodoni 72 Smallcaps", "Times New Roman", Georgia, serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      overflow: hidden;
    }

    body {
      height: 100dvh;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .app {
      position: relative;
      width: min(100%, var(--maxw));
      height: 100dvh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      padding:
        max(18px, env(safe-area-inset-top))
        max(22px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom))
        max(22px, env(safe-area-inset-left));
      background:
        radial-gradient(ellipse at top, rgba(0,0,0,.055), transparent 38%),
        linear-gradient(#fff, #fff);
    }

    .top {
      padding-top: 4px;
    }

    .masthead {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 18px;
      padding: 0 0 14px;
      border-bottom: clamp(4px, .75vw, 7px) solid var(--ink);
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .245em;
      font-size: clamp(.72rem, 3vw, .95rem);
      line-height: 1;
    }

    .counter {
      flex: 0 0 auto;
      letter-spacing: .15em;
      color: #242424;
      opacity: .88;
    }

    .stage {
      min-height: 0;
      display: grid;
      align-items: center;
      padding: clamp(10px, 3.2dvh, 28px) 0;
    }

    .scene {
      width: 100%;
      text-align: center;
      animation: sceneIn 420ms var(--ease) both;
      will-change: transform, opacity, filter;
    }

    .scene.no-auto-animate {
      animation: none;
    }

    .actions {
      border-top: 1px solid var(--soft);
      padding-top: clamp(12px, 2dvh, 18px);
      display: grid;
      gap: 12px;
    }

    .rule-label {
      display: inline-grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 13px;
      margin: 0 auto clamp(18px, 3.4dvh, 28px);
      font-size: clamp(.74rem, 3.1vw, 1.03rem);
      font-weight: 950;
      letter-spacing: .34em;
      text-transform: uppercase;
      line-height: 1;
    }

    .rule-label::before,
    .rule-label::after {
      content: "";
      width: clamp(52px, 17vw, 96px);
      height: 3px;
      background: var(--ink);
    }

    .decision-title {
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: end;
      gap: clamp(13px, 3.6vw, 20px);
      width: min(100%, 460px);
      text-align: left;
    }

    .decision-title .number {
      font-family: var(--display);
      font-size: clamp(8.2rem, 37vw, 15rem);
      font-weight: 1000;
      letter-spacing: -.055em;
      line-height: .74;
      transform: translateY(.03em);
    }

    .decision-title .word {
      font-family: var(--display);
      font-size: clamp(4rem, 18vw, 8.4rem);
      font-weight: 1000;
      line-height: .82;
      letter-spacing: -.035em;
      text-transform: uppercase;
    }

    .ante {
      margin: clamp(4px, .8dvh, 10px) 0 0;
      font-weight: 950;
      letter-spacing: -.065em;
      font-size: clamp(2.7rem, 12.2vw, 5.2rem);
      line-height: .9;
    }

    .choose-line {
      margin: clamp(20px, 3.9dvh, 34px) auto 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 18px;
      width: min(100%, 390px);
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(2rem, 8.6vw, 3.8rem);
      line-height: 1;
    }

    .choose-line::before,
    .choose-line::after {
      content: "";
      height: 3px;
      background: var(--ink);
    }

    .door-grid {
      display: grid;
      gap: 11px;
    }

    .choice-button,
    .primary-button,
    .ghost-button {
      width: 100%;
      min-height: clamp(64px, 9.4dvh, 86px);
      border: 4px solid var(--ink);
      border-radius: var(--radius);
      background: #fff;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 110ms var(--ease), background 110ms var(--ease), color 110ms var(--ease), border-radius 180ms var(--ease);
    }

    .choice-button:active,
    .primary-button:active,
    .ghost-button:active {
      transform: scale(.985);
      background: var(--ink);
      color: #fff;
      border-radius: 21px;
    }

    .choice-button {
      position: relative;
      display: grid;
      grid-template-columns: auto 1px 1fr;
      align-items: center;
      gap: clamp(18px, 5vw, 28px);
      padding: 0 clamp(21px, 6vw, 34px);
      text-align: left;
      overflow: hidden;
    }

    .choice-button.right {
      grid-template-columns: 1fr 1px auto;
      text-align: left;
    }

    .choice-num {
      font-weight: 1000;
      font-size: clamp(2.4rem, 10.2vw, 4.35rem);
      letter-spacing: -.06em;
      line-height: 1;
    }

    .choice-line {
      width: 1px;
      height: 42%;
      background: var(--ink);
      opacity: .55;
    }

    .choice-text {
      font-weight: 950;
      font-size: clamp(1.25rem, 5.7vw, 2.55rem);
      letter-spacing: -.055em;
      white-space: nowrap;
    }

    .selected-note {
      margin: 0 0 clamp(10px, 1.9dvh, 16px);
      color: var(--muted);
      font-size: clamp(.68rem, 2.7vw, .88rem);
      font-weight: 900;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    .monster-name {
      margin: 0 auto;
      width: min(100%, 500px);
      text-align: center;
      text-wrap: balance;
    }

    .monster-noun {
      display: block;
      font-family: var(--display);
      font-size: clamp(4.6rem, 20vw, 9.8rem);
      line-height: .78;
      letter-spacing: -.03em;
      text-transform: uppercase;
      font-weight: 1000;
    }

    .monster-adj {
      display: block;
      margin-top: clamp(-8px, -1.1dvh, -2px);
      font-family: var(--serif);
      font-size: clamp(3rem, 14vw, 7.2rem);
      line-height: .88;
      letter-spacing: -.08em;
      font-style: italic;
      font-weight: 500;
      text-transform: lowercase;
    }

    .monster-name.long .monster-noun { font-size: clamp(3.55rem, 16.6vw, 8.2rem); }
    .monster-name.long .monster-adj { font-size: clamp(2.35rem, 11.5vw, 5.8rem); }
    .monster-name.xlong .monster-noun { font-size: clamp(2.85rem, 13.6vw, 6.4rem); }
    .monster-name.xlong .monster-adj { font-size: clamp(2.05rem, 9.8vw, 4.9rem); }

    .connector {
      display: inline-block;
      margin: 0 .08em;
      font-family: var(--sans);
      font-size: .43em;
      letter-spacing: .02em;
      font-style: normal;
      font-weight: 950;
      color: var(--muted);
      transform: translateY(-.14em);
    }

    .primary-button,
    .ghost-button {
      display: grid;
      place-items: center;
      padding: 0 22px;
      font-family: var(--display);
      font-size: clamp(1.7rem, 8vw, 3.8rem);
      font-weight: 1000;
      letter-spacing: .035em;
      text-transform: uppercase;
      line-height: 1;
    }

    .ghost-button {
      min-height: clamp(48px, 6.8dvh, 60px);
      border-width: 2px;
      border-radius: 18px;
      font-family: var(--sans);
      font-size: clamp(.72rem, 3.15vw, 1rem);
      letter-spacing: .18em;
      font-weight: 900;
    }

    .combat-monster {
      margin-bottom: clamp(16px, 2.6dvh, 24px);
    }

    .combat-monster .monster-noun {
      font-size: clamp(3.2rem, 15.5vw, 7rem);
    }

    .combat-monster .monster-adj {
      font-size: clamp(2.3rem, 10.5vw, 5.4rem);
    }

    .dice-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: clamp(10px, 3vw, 18px);
      align-items: center;
      width: 100%;
      margin: 0 auto;
    }

    .roll-col {
      min-width: 0;
    }

    .roll-label {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      margin-bottom: 9px;
      font-size: clamp(.63rem, 2.7vw, .88rem);
      letter-spacing: .22em;
      font-weight: 950;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .roll-label::before,
    .roll-label::after {
      content: "";
      height: 2px;
      background: var(--ink);
    }

    .die {
      aspect-ratio: 1 / 1;
      width: 100%;
      border: 3px solid var(--ink);
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-family: var(--display);
      font-size: clamp(4.2rem, 22vw, 8.6rem);
      font-weight: 1000;
      line-height: 1;
      letter-spacing: -.04em;
      background: #fff;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    .die.rolling {
      animation: diePulse 70ms steps(2, end) infinite;
    }

    .vs {
      display: grid;
      place-items: center;
      gap: 7px;
      font-family: var(--display);
      font-size: clamp(1.55rem, 7vw, 3rem);
      font-weight: 1000;
      line-height: 1;
      text-transform: uppercase;
    }

    .vs::before,
    .vs::after {
      content: "";
      display: block;
      width: clamp(38px, 10vw, 56px);
      height: 3px;
      background: var(--ink);
    }

    .result-card {
      margin: clamp(18px, 3.4dvh, 30px) auto 0;
      width: min(100%, 430px);
      min-height: clamp(80px, 11dvh, 112px);
      display: grid;
      align-content: center;
      padding: 14px 18px;
      border-left: 2px solid var(--ink);
      border-right: 2px solid var(--ink);
      position: relative;
    }

    .result-card::before,
    .result-card::after {
      content: "";
      position: absolute;
      top: 0;
      width: 24%;
      height: 2px;
      background: var(--ink);
    }

    .result-card::before { left: 0; }
    .result-card::after { right: 0; }

    .result-main {
      margin: 0;
      font-size: clamp(.8rem, 3.7vw, 1.18rem);
      letter-spacing: .26em;
      font-weight: 950;
      text-transform: uppercase;
      line-height: 1.15;
    }

    .result-sub {
      margin: 8px 0 0;
      font-family: var(--serif);
      font-size: clamp(1.18rem, 5.7vw, 2.3rem);
      font-style: italic;
      line-height: 1;
      letter-spacing: -.035em;
    }

    .result-sub:empty { display: none; }

    .result-card.win {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
      animation: verdict 520ms var(--ease) both;
    }

    .result-card.win::before,
    .result-card.win::after {
      background: #fff;
    }

    .result-card.lose,
    .result-card.tie {
      animation: verdict 520ms var(--ease) both;
    }

    .mini-mark {
      margin: clamp(9px, 1.8dvh, 14px) 0 0;
      color: var(--muted);
      font-size: .72rem;
      font-weight: 850;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .transition-ghost {
      position: fixed;
      z-index: 9999;
      margin: 0;
      pointer-events: none;
      transform-origin: top left;
      background: transparent;
      will-change: transform, opacity, filter;
    }

    .app.is-transitioning,
    .app.is-transitioning button {
      pointer-events: none;
    }

    @keyframes sceneIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(.985);
        filter: blur(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes diePulse {
      0% { transform: translate(-1px, 1px) rotate(-1deg) scale(.99); }
      50% { transform: translate(1px, -1px) rotate(1deg) scale(1.01); }
      100% { transform: translate(0, 0) rotate(0deg) scale(1); }
    }

    @keyframes verdict {
      0% { transform: scale(.97); letter-spacing: .18em; }
      55% { transform: scale(1.035); }
      100% { transform: scale(1); }
    }

    @media (max-height: 720px) {
      .app {
        padding-top: max(12px, env(safe-area-inset-top));
        padding-bottom: max(10px, env(safe-area-inset-bottom));
      }

      .masthead {
        padding-bottom: 10px;
        border-bottom-width: 4px;
      }

      .stage {
        padding-top: 10px;
        padding-bottom: 10px;
      }

      .rule-label {
        margin-bottom: 14px;
      }

      .choose-line {
        margin-top: 14px;
      }

      .monster-noun {
        font-size: clamp(3.8rem, 17vw, 7.2rem);
      }

      .monster-adj {
        font-size: clamp(2.6rem, 11.7vw, 5.2rem);
      }

      .combat-monster {
        margin-bottom: 12px;
      }

      .combat-monster .monster-noun {
        font-size: clamp(2.8rem, 13.2vw, 5.6rem);
      }

      .combat-monster .monster-adj {
        font-size: clamp(2rem, 8.9vw, 4.1rem);
      }

      .result-card {
        margin-top: 14px;
        min-height: 72px;
      }

      .actions {
        padding-top: 10px;
        gap: 9px;
      }

      .choice-button,
      .primary-button {
        min-height: 60px;
        border-width: 3px;
        border-radius: 23px;
      }

      .ghost-button {
        min-height: 45px;
      }
    }

    @media (max-height: 620px) {
      .decision-title .number {
        font-size: clamp(6.3rem, 31vw, 10.8rem);
      }

      .decision-title .word {
        font-size: clamp(3.2rem, 15vw, 6.1rem);
      }

      .ante {
        font-size: clamp(2.1rem, 9.8vw, 3.8rem);
      }

      .choose-line {
        font-size: clamp(1.45rem, 6.7vw, 2.8rem);
      }

      .result-sub,
      .mini-mark {
        display: none;
      }
    }

    @media (min-width: 560px) {
      .app {
        border-left: 1px solid rgba(0,0,0,.05);
        border-right: 1px solid rgba(0,0,0,.05);
      }
    }

    /* --- Pulido editorial v2: más aire, más jerarquía y mejor encaje móvil --- */
    :root {
      --radius: 24px;
      --page-gutter: clamp(20px, 5.8vw, 30px);
    }

    .app {
      padding:
        max(14px, env(safe-area-inset-top))
        max(var(--page-gutter), env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom))
        max(var(--page-gutter), env(safe-area-inset-left));
      background:
        radial-gradient(ellipse at top, rgba(0,0,0,.045), transparent 34%),
        linear-gradient(#fff, #fff);
    }

    .top { padding-top: 2px; }

    .masthead {
      padding-bottom: clamp(10px, 1.8dvh, 14px);
      border-bottom-width: clamp(3px, .58vw, 5px);
      font-size: clamp(.66rem, 2.65vw, .86rem);
      letter-spacing: .235em;
    }

    .counter {
      letter-spacing: .14em;
      opacity: .78;
    }

    .stage {
      align-items: center;
      padding: clamp(8px, 2.2dvh, 22px) 0 clamp(10px, 2.6dvh, 24px);
    }

    .actions {
      padding-top: clamp(10px, 1.7dvh, 15px);
      gap: clamp(8px, 1.35dvh, 11px);
    }

    .rule-label {
      gap: clamp(11px, 3.3vw, 17px);
      margin-bottom: clamp(14px, 2.65dvh, 22px);
      font-size: clamp(.66rem, 2.72vw, .91rem);
      letter-spacing: .38em;
    }

    .rule-label::before,
    .rule-label::after {
      width: clamp(44px, 15vw, 86px);
      height: 2px;
    }

    .decision-scene {
      transform: translateY(clamp(6px, 1.2dvh, 14px));
    }

    .decision-title {
      width: min(100%, 430px);
      gap: clamp(10px, 3vw, 16px);
    }

    .decision-title .number {
      font-size: clamp(7.35rem, 34vw, 13.2rem);
      line-height: .72;
    }

    .decision-title .word {
      font-size: clamp(3.7rem, 16.8vw, 7.6rem);
      line-height: .83;
    }

    .ante {
      margin-top: clamp(8px, 1.2dvh, 14px);
      font-size: clamp(2.25rem, 10.6vw, 4.45rem);
      line-height: .86;
    }

    .choose-line {
      margin-top: clamp(14px, 2.55dvh, 24px);
      width: min(100%, 410px);
      gap: clamp(12px, 3.2vw, 17px);
      font-size: clamp(1.45rem, 6.8vw, 2.9rem);
      letter-spacing: -.045em;
    }

    .choose-line::before,
    .choose-line::after { height: 2px; }

    .scene-whisper {
      margin: clamp(13px, 2.35dvh, 22px) auto 0;
      color: #111;
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(1.05rem, 4.8vw, 1.9rem);
      line-height: 1;
      letter-spacing: -.035em;
      opacity: .88;
    }

    .door-grid { gap: clamp(8px, 1.35dvh, 11px); }

    .choice-button,
    .primary-button {
      min-height: clamp(58px, 8dvh, 74px);
      border-width: 3px;
      border-radius: var(--radius);
    }

    .choice-button {
      gap: clamp(15px, 4.3vw, 24px);
      padding: 0 clamp(20px, 5.5vw, 31px);
    }

    .choice-button:first-child { margin-left: -3px; width: calc(100% - 1px); }
    .choice-button.right { margin-left: 4px; width: calc(100% - 4px); }

    .choice-num {
      font-size: clamp(2.3rem, 9.4vw, 3.85rem);
      letter-spacing: -.055em;
    }

    .choice-line { height: 38%; opacity: .45; }

    .choice-text {
      font-size: clamp(1.08rem, 5.02vw, 2.08rem);
      letter-spacing: -.047em;
    }

    .choice-button:active,
    .primary-button:active,
    .ghost-button:active {
      border-radius: 19px;
    }

    .selected-note {
      margin-bottom: clamp(11px, 2.15dvh, 18px);
      color: #5f5f5f;
      font-size: clamp(.62rem, 2.5vw, .8rem);
      letter-spacing: .31em;
    }

    .selected-note .door-note-line,
    .selected-note .door-note-open {
      display: block;
    }

    .selected-note .door-note-open {
      margin-top: clamp(6px, 1dvh, 9px);
      color: #151515;
      font-size: .9em;
      letter-spacing: .36em;
    }

    .monster-scene {
      transform: translateY(clamp(10px, 2.15dvh, 24px));
    }

    .monster-scene .rule-label {
      margin-bottom: clamp(13px, 2.35dvh, 20px);
    }

    .monster-noun {
      font-size: clamp(4.25rem, 18.4vw, 9.15rem);
      line-height: .78;
    }

    .monster-adj {
      margin-top: clamp(-5px, -.65dvh, 0px);
      font-size: clamp(2.75rem, 12.5vw, 6.45rem);
      line-height: .84;
    }

    .monster-name.long .monster-noun { font-size: clamp(3.25rem, 15.1vw, 7.25rem); }
    .monster-name.long .monster-adj { font-size: clamp(2.12rem, 10vw, 5.05rem); }
    .monster-name.xlong .monster-noun { font-size: clamp(2.62rem, 12.5vw, 5.72rem); }
    .monster-name.xlong .monster-adj { font-size: clamp(1.82rem, 8.65vw, 4.28rem); }

    .monster-scene .mini-mark {
      margin-top: clamp(18px, 3dvh, 27px);
      color: #111;
      font-family: var(--serif);
      font-size: clamp(1.12rem, 5.2vw, 2.02rem);
      font-style: italic;
      font-weight: 400;
      letter-spacing: -.035em;
      line-height: 1;
      text-transform: none;
    }

    .primary-button {
      padding: 0 18px;
      font-size: clamp(1.48rem, 6.85vw, 3.1rem);
      letter-spacing: .045em;
      white-space: nowrap;
    }

    .primary-button.next-button {
      font-size: clamp(1.18rem, 5.75vw, 2.42rem);
      letter-spacing: .035em;
    }

    .ghost-button {
      min-height: clamp(36px, 5dvh, 44px);
      border: 0;
      border-radius: 0;
      background: transparent;
      font-family: var(--sans);
      font-size: clamp(.58rem, 2.62vw, .78rem);
      font-weight: 900;
      letter-spacing: .2em;
      text-decoration: underline;
      text-underline-offset: 7px;
      text-decoration-thickness: 1px;
      opacity: .86;
    }

    .ghost-button:active {
      background: transparent;
      color: var(--ink);
      transform: translateY(1px) scale(.99);
      border-radius: 0;
      opacity: 1;
    }

    .combat-scene {

<body>
  <div class="app" id="app">
    <header class="top">
      <div class="masthead">
        <span class="counter" id="counter">NVL 1</span>

      </div>
    </header>

    <main class="stage" id="stage" aria-live="polite" aria-atomic="true"></main>
    <section class="actions" id="actions"></section>
  </div>

  <script>
    const nouns = [
      { text: "Payaso", gender: "m" },
      { text: "Zombie", gender: "m" },
      { text: "Momia", gender: "f" },
      { text: "Vampiro", gender: "m" },
      { text: "Capibara", gender: "m" },
      { text: "Gremlin", gender: "m" },
      { text: "Fantasma", gender: "m" },
      { text: "Esqueleto", gender: "m" },
      { text: "Bruja", gender: "f" },
      { text: "Ogro", gender: "m" },
      { text: "Duende", gender: "m" },
      { text: "Sirena", gender: "f" },
      { text: "Hombre lobo", gender: "m" },
      { text: "Gárgola", gender: "f" },
      { text: "Cactus", gender: "m" },
      { text: "Peluche", gender: "m" },
      { text: "Cocodrilo", gender: "m" },
      { text: "Seta", gender: "f" },
      { text: "Maniquí", gender: "m" },
      { text: "Mapache", gender: "m" },
      { text: "Caballero", gender: "m" },
      { text: "Murciélago", gender: "m" },
      { text: "Calabaza", gender: "f" },
      { text: "Retrato", gender: "m" },
      { text: "Mayordomo", gender: "m" },
      { text: "Sombra", gender: "f" }
    ];

    const adjectives = [
      { m: "sanguinario", f: "sanguinaria" },
      { m: "maloliente", f: "maloliente" },
      { m: "perfumado", f: "perfumada" },
      { m: "sonriente", f: "sonriente" },
      { m: "triste", f: "triste" },
      { m: "pegajoso", f: "pegajosa" },
      { m: "dramático", f: "dramática" },
      { m: "elegante", f: "elegante" },
      { m: "resentido", f: "resentida" },
      { m: "melancólico", f: "melancólica" },
      { m: "diminuto", f: "diminuta" },
      { m: "colosal", f: "colosal" },
      { m: "susurrante", f: "susurrante" },
      { m: "rencoroso", f: "rencorosa" },
      { m: "despeinado", f: "despeinada" },
      { m: "glorioso", f: "gloriosa" },
      { m: "patético", f: "patética" },
      { m: "viscoso", f: "viscosa" },
      { m: "crujiente", f: "crujiente" },
      { m: "educadísimo", f: "educadísima" },
      { m: "torpe", f: "torpe" },
      { m: "siniestro", f: "siniestra" },
      { m: "amargado", f: "amargada" },
      { m: "festivo", f: "festiva" },
      { m: "culpable", f: "culpable" },
      { m: "mimoso", f: "mimosa" },
      { m: "histérico", f: "histérica" },
      { m: "puntilloso", f: "puntillosa" },
      { m: "caducado", f: "caducada" },
      { m: "carismático", f: "carismática" },
      { m: "sudoroso", f: "sudorosa" },
      { m: "arrepentido", f: "arrepentida" },
      { m: "cósmico", f: "cósmica" },
      { m: "dominguero", f: "dominguera" },
      { m: "teatral", f: "teatral" },
      { m: "bizco", f: "bizca" },
      { m: "envidioso", f: "envidiosa" },
      { m: "polvoriento", f: "polvorienta" },
      { m: "misterioso", f: "misteriosa" },
      { m: "sobreactuado", f: "sobreactuada" },
      { m: "insoportable", f: "insoportable" },
      { m: "solemne", f: "solemne" },
      { m: "ridículo", f: "ridícula" },
      { m: "impecable", f: "impecable" }
    ];

    const stage = document.getElementById("stage");
    const actions = document.getElementById("actions");
    const counter = document.getElementById("counter");

    const state = {
      room: 1,
      screen: "doors",
      chosenDoor: "",
      monster: null,
      playerRoll: null,
      enemyRoll: null,
      rolled: false,
      rolling: false,
      lastMonsterRaw: "",
      canFlee: false,
      playerLevel: 1
    };

    function randomItem(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function pickUniqueAdjectives(amount) {
      const pool = [...adjectives];
      const picked = [];
      while (picked.length < amount && pool.length) {
        const index = Math.floor(Math.random() * pool.length);
        picked.push(pool.splice(index, 1)[0]);
      }
      return picked;
    }

    function adjectiveCount() {
      const roll = Math.random();
      if (roll < .05) return 3;
      if (roll < .45) return 2;
      return 1;
    }

    function adjectiveText(adjective, gender) {
      return gender === "f" ? adjective.f : adjective.m;
    }

    function buildAdjectiveLine(words) {
      const clean = words.map(escapeHtml);
      if (clean.length === 1) return clean[0];
      if (clean.length === 2) {
        const connector = Math.random() < .5 ? "y" : "pero";
        return `${clean[0]} <span class="connector">${connector}</span> ${clean[1]}`;
      }
      const yFirst = Math.random() < .5;
      if (yFirst) {
        return `${clean[0]} <span class="connector">y</span> ${clean[1]} <span class="connector">pero</span> ${clean[2]}`;
      }
      return `${clean[0]} <span class="connector">pero</span> ${clean[1]} <span class="connector">y</span> ${clean[2]}`;
    }

    function generateMonster() {
      let monster;
      let attempts = 0;
      do {
        const noun = randomItem(nouns);
        const picked = pickUniqueAdjectives(adjectiveCount());
        const words = picked.map(adj => adjectiveText(adj, noun.gender));
        monster = {
          noun: noun.text,
          adjectives: words,
          adjectiveHtml: buildAdjectiveLine(words),
          raw: `${noun.text} ${words.join(" ")}`,
          level: 1 + Math.floor(Math.random() * 6)
        };
        attempts += 1;
      } while (monster.raw === state.lastMonsterRaw && attempts < 12);
      state.lastMonsterRaw = monster.raw;
      return monster;
    }

    function nameSizeClass(monster) {
      const score = monster.raw.length + monster.adjectives.length * 5;
      if (score > 44) return "xlong";
      if (score > 32) return "long";
      return "";
    }

    function monsterName(monster, extraClass = "") {
      return `
        <h1 class="monster-name ${nameSizeClass(monster)} ${extraClass}" data-shared="name">
          <span class="monster-noun" data-shared="noun">${escapeHtml(monster.noun)}</span>
          <span class="monster-adj" data-shared="adj">${monster.adjectiveHtml}</span>
        </h1>
      `;
    }

    function updateCounter() {
      counter.textContent = `NVL ${state.playerLevel}`;
    }

    function render(options = {}) {
      updateCounter();
      stage.innerHTML = "";
      actions.innerHTML = "";

      if (state.screen === "doors") renderDoors(options);
      if (state.screen === "monster") renderMonster(options);
      if (state.screen === "combat") renderCombat(options);
    }

    function sceneClasses(options = {}) {
      return `scene ${options.noSceneAnimation ? "no-auto-animate" : ""}`.trim();
    }

    function renderDoors(options = {}) {
      stage.innerHTML = `
        <section class="${sceneClasses(options)} decision-scene">
          <div class="rule-label">Decisión</div>
          <h1 class="decision-title" aria-label="Dos puertas ante ti">
            <span class="number">2</span>
            <span class="word">Puertas</span>
          </h1>
          <p class="ante">ante ti</p>
          <div class="choose-line"><span>elige una puerta</span></div>
        </section>
      `;
      actions.innerHTML = `
        <div class="door-grid">
          <button class="choice-button" type="button" data-door="izquierda" aria-label="Elegir puerta izquierda">
            <span class="choice-num">01</span>
            <span class="choice-line" aria-hidden="true"></span>
            <span class="choice-text">Puerta izquierda</span>
          </button>
          <button class="choice-button right" type="button" data-door="derecha" aria-label="Elegir puerta derecha">
            <span class="choice-text">Puerta derecha</span>
            <span class="choice-line" aria-hidden="true"></span>
            <span class="choice-num">02</span>
          </button>
        </div>
      `;
      actions.querySelectorAll("[data-door]").forEach(button => {
        button.addEventListener("click", () => chooseDoor(button.dataset.door));
      });
    }

    function renderMonster(options = {}) {
      const doorText = state.chosenDoor === "izquierda" ? "Puerta izquierda" : "Puerta derecha";
      stage.innerHTML = `
        <section class="${sceneClasses(options)} monster-scene">
          <div class="selected-note"><span class="door-note-line">${escapeHtml(doorText)}</span><span class="door-note-open">abierta</span></div>
          <div class="rule-label" data-shared="label">Enemigo NVL. ${state.monster.level}</div>
          ${monsterName(state.monster)}
        </section>
      `;

      const fleeButton = state.canFlee
        ? '<button class="ghost-button" type="button" id="fleeButton">Huir por la otra puerta</button>'
        : '';

      actions.innerHTML = `
        <button class="primary-button" type="button" id="combatButton">Entrar en combate</button>
        ${fleeButton}
      `;
      document.getElementById("combatButton").addEventListener("click", startCombat);
      const fleeEl = document.getElementById("fleeButton");
      if (fleeEl) fleeEl.addEventListener("click", fleeOtherDoor);
    }

    function renderCombat(options = {}) {
      const result = getResult();
      stage.innerHTML = `
        <section class="${sceneClasses(options)} combat-scene">
          <div class="rule-label" data-shared="label">Batalla NVL. ${state.monster.level}</div>
          ${monsterName(state.monster, "combat-monster")}
          <div class="dice-row" aria-label="Tiradas de combate">
            <div class="roll-col">
              <div class="roll-label">Tu tirada</div>
              <div class="die" id="playerDie">${state.playerRoll ?? "—"}</div>
            </div>
            <div class="vs">VS</div>
            <div class="roll-col">
              <div class="roll-label">Su tirada</div>
              <div class="die" id="enemyDie">${state.enemyRoll ?? "—"}</div>
            </div>
          </div>
          <div class="result-card ${state.rolled ? result.kind : ""}" id="resultCard">
            <p class="result-main">${state.rolled ? result.title : "Tirada pendiente"}</p>
            <p class="result-sub">${state.rolled ? result.subtitle : ""}</p>
          </div>
        </section>
      `;

      if (!state.rolled) {
        actions.innerHTML = `<button class="primary-button" type="button" id="rollButton">Lanzar dados</button>`;
        document.getElementById("rollButton").addEventListener("click", rollDice);
      } else {
        actions.innerHTML = `
          <button class="primary-button next-button" type="button" id="nextRoomButton">Siguiente habitación</button>
        `;
        document.getElementById("nextRoomButton").addEventListener("click", nextRoom);
      }
    }

    function prefersReducedMotion() {
      return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    }

    function getRect(element) {
      if (!element) return null;
      const rect = element.getBoundingClientRect();
      return {
        left: rect.left,
        top: rect.top,
        width: rect.width,
        height: rect.height
      };
    }

    function animateFromRect(element, fromRect, config = {}) {
      if (!element || !fromRect || prefersReducedMotion()) return;
      const toRect = element.getBoundingClientRect();
      if (!toRect.width || !toRect.height) return;

      const dx = fromRect.left - toRect.left;
      const dy = fromRect.top - toRect.top;
      const sx = fromRect.width / toRect.width;
      const sy = fromRect.height / toRect.height;

      element.animate([
        {
          transformOrigin: 'top left',
          transform: `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`,
          opacity: config.fromOpacity ?? 1,
          filter: 'blur(0px)'
        },
        {
          transformOrigin: 'top left',
          transform: 'translate(0px, 0px) scale(1, 1)',
          opacity: 1,
          filter: 'blur(0px)'
        }
      ], {
        duration: config.duration ?? 720,
        delay: config.delay ?? 0,
        easing: config.easing ?? 'cubic-bezier(.22,1,.36,1)',
        fill: 'both'
      });
    }

    function animateIn(element, config = {}) {
      if (!element) return;
      if (prefersReducedMotion()) {
        element.style.opacity = '1';
        return;
      }

      element.animate([
        {
          opacity: config.fromOpacity ?? 0,
          transform: `translateY(${config.fromY ?? 18}px) scale(${config.fromScale ?? .985})`,
          filter: `blur(${config.fromBlur ?? 8}px)`
        },
        {
          opacity: 1,
          transform: 'translateY(0px) scale(1)',
          filter: 'blur(0px)'
        }
      ], {
        duration: config.duration ?? 600,
        delay: config.delay ?? 0,
        easing: config.easing ?? 'cubic-bezier(.22,1,.36,1)',
        fill: 'both'
      });
    }

    function animateOut(element, config = {}) {
      if (!element) return;
      if (prefersReducedMotion()) {
        element.style.opacity = '0';
        return;
      }

      return element.animate([
        {
          opacity: config.fromOpacity ?? 1,
          transform: `translateY(${config.fromY ?? 0}px) scale(${config.fromScale ?? 1})`,
          filter: 'blur(0px)'
        },
        {
          opacity: config.toOpacity ?? 0,
          transform: `translateY(${config.toY ?? -18}px) scale(${config.toScale ?? .97})`,
          filter: `blur(${config.toBlur ?? 8}px)`
        }
      ], {
        duration: config.duration ?? 360,
        delay: config.delay ?? 0,
        easing: config.easing ?? 'ease-out',
        fill: 'forwards'
      });
    }

    function createGhost(element) {
      if (!element || prefersReducedMotion()) return null;
      const rect = element.getBoundingClientRect();
      const ghost = element.cloneNode(true);
      ghost.classList.add('transition-ghost');
      ghost.style.left = `${rect.left}px`;
      ghost.style.top = `${rect.top}px`;
      ghost.style.width = `${rect.width}px`;
      ghost.style.height = `${rect.height}px`;
      ghost.style.opacity = '1';
      document.body.appendChild(ghost);
      return ghost;
    }

    function removeGhost(ghost) {
      if (!ghost) return;
      ghost.remove();
    }

    function cleanupTransition(delay = 900) {
      setTimeout(() => {
        document.getElementById('app').classList.remove('is-transitioning');
      }, prefersReducedMotion() ? 0 : delay);
    }

    function runDoorToMonsterTransition(snapshot) {
      const note = stage.querySelector('.selected-note');
      const label = stage.querySelector('[data-shared="label"]');
      const noun = stage.querySelector('[data-shared="noun"]');
      const adj = stage.querySelector('[data-shared="adj"]');
      const mark = stage.querySelector('.mini-mark');
      const button = actions.querySelector('.primary-button');
      const fleeButton = actions.querySelector('#fleeButton');

      animateIn(note, { delay: 70, fromY: -8, fromScale: .99, duration: 460, fromBlur: 4 });
      animateIn(label, { delay: 120, fromY: 18, duration: 500, fromBlur: 6 });
      animateIn(noun, { delay: 170, fromY: 28, fromScale: .955, duration: 760, fromBlur: 10 });
      animateIn(adj, { delay: 230, fromY: 20, fromScale: .97, duration: 780, fromBlur: 10 });
      animateIn(mark, { delay: 300, fromY: 12, fromScale: .99, duration: 520, fromBlur: 5 });
      animateIn(button, { delay: 340, fromY: 20, fromScale: .985, duration: 620, fromBlur: 7 });
      animateIn(fleeButton, { delay: 430, fromY: 14, fromScale: .985, duration: 540, fromBlur: 6 });

      if (snapshot.selectedRect) {
        animateFromRect(note, snapshot.selectedRect, { duration: 680, fromOpacity: .88, easing: 'cubic-bezier(.22,1,.36,1)' });
      }

      if (snapshot.sceneGhost) {
        animateOut(snapshot.sceneGhost, { toY: -24, toScale: .985, toBlur: 8, duration: 360 });
        setTimeout(() => removeGhost(snapshot.sceneGhost), 420);
      }
      if (snapshot.selectedGhost) {
        animateOut(snapshot.selectedGhost, { toY: -18, toScale: .96, toBlur: 8, duration: 360 });
        setTimeout(() => removeGhost(snapshot.selectedGhost), 420);
      }
      if (snapshot.otherGhost) {
        animateOut(snapshot.otherGhost, { toY: 18, toScale: .98, toBlur: 8, duration: 280, delay: 20 });
        setTimeout(() => removeGhost(snapshot.otherGhost), 360);
      }

      cleanupTransition(980);
    }

    function runCombatTransition(snapshot) {
      const label = stage.querySelector('[data-shared="label"]');
      const noun = stage.querySelector('[data-shared="noun"]');
      const adj = stage.querySelector('[data-shared="adj"]');
      const button = actions.querySelector('.primary-button');
      const diceRow = stage.querySelector('.dice-row');
      const resultCard = stage.querySelector('.result-card');
      const rollLabels = stage.querySelectorAll('.roll-label, .vs');

      animateFromRect(label, snapshot.label, { duration: 700 });
      animateFromRect(noun, snapshot.noun, { duration: 760, delay: 20 });
      animateFromRect(adj, snapshot.adj, { duration: 780, delay: 45 });
      animateFromRect(button, snapshot.button, { duration: 720, delay: 80, fromOpacity: .96 });

      animateIn(diceRow, { delay: 180, fromY: 32, fromScale: .97, duration: 700, fromBlur: 10 });
      animateIn(resultCard, { delay: 260, fromY: 26, fromScale: .985, duration: 700, fromBlur: 8 });
      rollLabels.forEach((el, index) => animateIn(el, { delay: 220 + (index * 35), fromY: 10, fromScale: .99, duration: 520, fromBlur: 5 }));

      if (snapshot.noteGhost) {
        snapshot.noteGhost.animate([
          { opacity: 1, transform: 'translateY(0px) scale(1)', filter: 'blur(0px)' },
          { opacity: 0, transform: 'translateY(-16px) scale(.98)', filter: 'blur(6px)' }
        ], { duration: 320, easing: 'ease-out', fill: 'forwards' }).finished.finally(() => removeGhost(snapshot.noteGhost));
      }

      if (snapshot.markGhost) {
        snapshot.markGhost.animate([
          { opacity: .85, transform: 'translateY(0px)', filter: 'blur(0px)' },
          { opacity: 0, transform: 'translateY(-10px)', filter: 'blur(6px)' }
        ], { duration: 280, delay: 40, easing: 'ease-out', fill: 'forwards' }).finished.finally(() => removeGhost(snapshot.markGhost));
      }

      cleanupTransition(900);
    }

    function runFleeTransition(snapshot) {
      const direction = snapshot.fromDoor === "izquierda" ? 1 : -1;
      const note = stage.querySelector('.selected-note');
      const label = stage.querySelector('[data-shared="label"]');
      const noun = stage.querySelector('[data-shared="noun"]');
      const adj = stage.querySelector('[data-shared="adj"]');
      const mark = stage.querySelector('.mini-mark');
      const combatButton = actions.querySelector('.primary-button');

      if (snapshot.nameGhost) {
        snapshot.nameGhost.animate([
          { opacity: 1, transform: 'translateX(0px) scale(1)', filter: 'blur(0px)' },
          { opacity: 0, transform: `translateX(${direction * -84}px) scale(.94)`, filter: 'blur(12px)' }
        ], { duration: 430, easing: 'cubic-bezier(.4,0,.2,1)', fill: 'forwards' })
          .finished.finally(() => removeGhost(snapshot.nameGhost));
      }

      if (snapshot.labelGhost) {
        snapshot.labelGhost.animate([
          { opacity: 1, transform: 'translateY(0px) scale(1)', filter: 'blur(0px)' },
          { opacity: 0, transform: 'translateY(-16px) scale(.98)', filter: 'blur(7px)' }
        ], { duration: 280, easing: 'ease-out', fill: 'forwards' })
          .finished.finally(() => removeGhost(snapshot.labelGhost));
      }

      if (snapshot.noteGhost) {
        snapshot.noteGhost.animate([
          { opacity: 1, transform: 'translateY(0px)', filter: 'blur(0px)' },
          { opacity: 0, transform: `translateX(${direction * -34}px) translateY(-8px)`, filter: 'blur(6px)' }
        ], { duration: 300, easing: 'ease-out', fill: 'forwards' })
          .finished.finally(() => removeGhost(snapshot.noteGhost));
      }

      if (snapshot.markGhost) {
        snapshot.markGhost.animate([
          { opacity: .88, transform: 'translateY(0px)', filter: 'blur(0px)' },
          { opacity: 0, transform: `translateX(${direction * -42}px) translateY(8px)`, filter: 'blur(6px)' }
        ], { duration: 280, delay: 40, easing: 'ease-out', fill: 'forwards' })
          .finished.finally(() => removeGhost(snapshot.markGhost));
      }

      if (snapshot.combatButtonGhost) {
        snapshot.combatButtonGhost.animate([
          { opacity: 1, transform: 'translateY(0px) scale(1)', filter: 'blur(0px)' },
          { opacity: 0, transform: 'translateY(18px) scale(.985)', filter: 'blur(7px)' }
        ], { duration: 280, easing: 'ease-out', fill: 'forwards' })
          .finished.finally(() => removeGhost(snapshot.combatButtonGhost));
      }

      if (snapshot.fleeButtonGhost) {
        snapshot.fleeButtonGhost.animate([
          { opacity: 1, transform: 'translateY(0px) scale(1)', filter: 'blur(0px)' },
          { opacity: 0, transform: `translateX(${direction * 52}px) translateY(14px) scale(.96)`, filter: 'blur(10px)' }
        ], { duration: 360, easing: 'cubic-bezier(.4,0,.2,1)', fill: 'forwards' })
          .finished.finally(() => removeGhost(snapshot.fleeButtonGhost));
      }

      animateIn(note, { delay: 160, fromY: -10, fromScale: .99, duration: 520, fromBlur: 6 });
      animateIn(label, { delay: 210, fromY: 10, fromScale: .99, duration: 520, fromBlur: 6 });

      [noun, adj].forEach((element, index) => {
        if (!element) return;
        if (prefersReducedMotion()) {
          element.style.opacity = '1';
          return;
        }

        element.animate([
          {
            opacity: 0,
            transform: `translateX(${direction * 92}px) translateY(${index ? 18 : 24}px) scale(${index ? .97 : .94})`,
            filter: 'blur(12px)'
          },
          {
            opacity: 1,
            transform: 'translateX(0px) translateY(0px) scale(1)',
            filter: 'blur(0px)'
          }
        ], {
          duration: index ? 760 : 780,
          delay: index ? 280 : 230,
          easing: 'cubic-bezier(.22,1,.36,1)',
          fill: 'both'
        });
      });

      animateIn(mark, { delay: 410, fromY: 10, fromScale: .99, duration: 520, fromBlur: 5 });
      animateIn(combatButton, { delay: 470, fromY: 22, fromScale: .985, duration: 640, fromBlur: 8 });

      cleanupTransition(1120);
    }

    function runCombatToDoorsTransition(snapshot) {
      const label = stage.querySelector('.rule-label');
      const number = stage.querySelector('.decision-title .number');
      const word = stage.querySelector('.decision-title .word');
      const ante = stage.querySelector('.ante');
      const choose = stage.querySelector('.choose-line');
      const doorButtons = actions.querySelectorAll('[data-door]');

      animateIn(label, { delay: 90, fromY: 16, duration: 460, fromBlur: 5 });
      animateIn(number, { delay: 150, fromY: 24, fromScale: .94, duration: 760, fromBlur: 10 });
      animateIn(word, { delay: 190, fromY: 20, fromScale: .96, duration: 720, fromBlur: 8 });
      animateIn(ante, { delay: 250, fromY: 16, fromScale: .98, duration: 560, fromBlur: 6 });
      animateIn(choose, { delay: 290, fromY: 14, duration: 540, fromBlur: 5 });
      doorButtons.forEach((button, index) => {
        animateIn(button, { delay: 360 + (index * 70), fromY: 24, fromScale: .985, duration: 620, fromBlur: 8 });
      });

      if (snapshot.sceneGhost) {
        animateOut(snapshot.sceneGhost, { toY: -28, toScale: .985, toBlur: 9, duration: 340 });
        setTimeout(() => removeGhost(snapshot.sceneGhost), 420);
      }
      if (snapshot.actionGhost) {
        animateOut(snapshot.actionGhost, { toY: 18, toScale: .98, toBlur: 8, duration: 300 });
        setTimeout(() => removeGhost(snapshot.actionGhost), 360);
      }

      cleanupTransition(980);
    }

    function chooseDoor(door) {
      const app = document.getElementById('app');
      const doorButtons = Array.from(actions.querySelectorAll('[data-door]'));
      const selectedButton = doorButtons.find(button => button.dataset.door === door);
      const otherButton = doorButtons.find(button => button.dataset.door !== door);

      const snapshot = {
        selectedRect: getRect(selectedButton),
        selectedGhost: createGhost(selectedButton),
        otherGhost: createGhost(otherButton),
        sceneGhost: createGhost(stage.querySelector('.decision-scene'))
      };

      app.classList.add('is-transitioning');

      state.chosenDoor = door;
      state.monster = generateMonster();
      state.canFlee = true;
      state.screen = "monster";
      render({ noSceneAnimation: true });
      requestAnimationFrame(() => runDoorToMonsterTransition(snapshot));
    }

    function fleeOtherDoor() {
      if (!state.canFlee) return;

      const app = document.getElementById('app');
      const snapshot = {
        fromDoor: state.chosenDoor,
        noteGhost: createGhost(stage.querySelector('.selected-note')),
        labelGhost: createGhost(stage.querySelector('[data-shared="label"]')),
        nameGhost: createGhost(stage.querySelector('.monster-name')),
        markGhost: createGhost(stage.querySelector('.mini-mark')),
        combatButtonGhost: createGhost(actions.querySelector('.primary-button')),
        fleeButtonGhost: createGhost(actions.querySelector('#fleeButton'))
      };

      app.classList.add('is-transitioning');

      state.chosenDoor = state.chosenDoor === "izquierda" ? "derecha" : "izquierda";
      state.monster = generateMonster();
      state.canFlee = false;
      render({ noSceneAnimation: true });
      requestAnimationFrame(() => runFleeTransition(snapshot));
    }

    function startCombat() {
      const app = document.getElementById('app');
      const snapshot = {
        label: getRect(stage.querySelector('[data-shared="label"]')),
        noun: getRect(stage.querySelector('[data-shared="noun"]')),
        adj: getRect(stage.querySelector('[data-shared="adj"]')),
        button: getRect(actions.querySelector('.primary-button')),
        noteGhost: createGhost(stage.querySelector('.selected-note')),
        markGhost: createGhost(stage.querySelector('.mini-mark'))
      };

      app.classList.add('is-transitioning');

      state.screen = "combat";
      state.playerRoll = null;
      state.enemyRoll = null;
      state.rolled = false;
      state.rolling = false;
      state.canFlee = false;
      render({ noSceneAnimation: true });
      requestAnimationFrame(() => runCombatTransition(snapshot));
    }

    function rollDice() {
      if (state.rolling) return;
      state.rolling = true;
      const button = document.getElementById("rollButton");
      const playerDie = document.getElementById("playerDie");
      const enemyDie = document.getElementById("enemyDie");
      const resultCard = document.getElementById("resultCard");

      button.disabled = true;
      button.textContent = "Rodando…";
      playerDie.classList.add("rolling");
      enemyDie.classList.add("rolling");
      resultCard.querySelector(".result-main").textContent = "Rodando";
      resultCard.querySelector(".result-sub").textContent = "";

      let ticks = 0;
      const maxTicks = 18 + Math.floor(Math.random() * 7);
      const interval = setInterval(() => {
        ticks += 1;
        playerDie.textContent = String(1 + Math.floor(Math.random() * 6));
        enemyDie.textContent = String(1 + Math.floor(Math.random() * 6));

        if (ticks >= maxTicks) {
          clearInterval(interval);
          state.playerRoll = 1 + Math.floor(Math.random() * 6);
          state.enemyRoll = 1 + Math.floor(Math.random() * 6);
          const outcome = getOutcomeKind();
          if (outcome === "win") state.playerLevel += 1;
          if (outcome === "lose") state.playerLevel = Math.max(1, state.playerLevel - 1);
          state.rolled = true;
          state.rolling = false;
          render();
        }
      }, 58);
    }

    function getOutcomeKind() {
      if (state.playerRoll > state.enemyRoll) return "win";
      if (state.playerRoll < state.enemyRoll) return "lose";
      return "tie";
    }

    function getResult() {
      const kind = getOutcomeKind();
      if (kind === "win") {
        return {
          kind,
          title: "Ganas el turno",
          subtitle: ""
        };
      }
      if (kind === "lose") {
        return {
          kind,
          title: "Pierdes el turno",
          subtitle: ""
        };
      }
      return {
        kind,
        title: "Empate",
        subtitle: ""
      };
    }

    function nextRoom() {
      const app = document.getElementById('app');
      const snapshot = {
        sceneGhost: createGhost(stage.querySelector('.combat-scene')),
        actionGhost: createGhost(actions.querySelector('.primary-button'))
      };

      app.classList.add('is-transitioning');

      state.room += 1;
      state.screen = "doors";
      state.chosenDoor = "";
      state.monster = null;
      state.playerRoll = null;
      state.enemyRoll = null;
      state.rolled = false;
      state.rolling = false;
      state.canFlee = false;
      render({ noSceneAnimation: true });
      requestAnimationFrame(() => runCombatToDoorsTransition(snapshot));
    }

    document.addEventListener("keydown", event => {
      if (event.key === "1" && state.screen === "doors") chooseDoor("izquierda");
      if (event.key === "2" && state.screen === "doors") chooseDoor("derecha");
      if ((event.key === "Enter" || event.key === " ") && state.screen === "combat" && !state.rolled) {
        event.preventDefault();
        rollDice();
      }
      if ((event.key === "Enter" || event.key === " ") && state.screen === "combat" && state.rolled) {
        event.preventDefault();
        nextRoom();
      }
    });

    render();
  </script>
</body>
</html>
